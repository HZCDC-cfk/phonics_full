<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔤 自然拼读 · 音素拼读练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(145deg, #f0f5fb 0%, #e2eaf3 100%);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 28px 28px 36px;
            box-shadow: 0 20px 60px rgba(0,20,40,0.12);
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a3244;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 small { font-size: 1rem; font-weight: 400; color: #4f7a9c; }
        .sub {
            color: #3a5f7a;
            font-size: 1.05rem;
            border-left: 4px solid #6ab0e6;
            padding-left: 16px;
            margin-bottom: 24px;
            opacity: 0.8;
        }

        /* 规则选择器 - 滚动 */
        .rule-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
            margin-bottom: 20px;
            max-height: 120px;
            overflow-y: auto;
            padding: 4px 2px;
            scrollbar-width: thin;
        }
        .rule-strip::-webkit-scrollbar { width: 4px; }
        .rule-strip::-webkit-scrollbar-thumb { background: #6ab0e6; border-radius: 4px; }

        .rule-btn {
            background: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #1a3244;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            white-space: nowrap;
        }
        .rule-btn:hover { transform: translateY(-2px); background: #f5faff; }
        .rule-btn.active {
            border-color: #6ab0e6;
            background: #e3f0fa;
            color: #0d4b6e;
            box-shadow: 0 4px 12px rgba(106, 176, 230, 0.25);
        }

        .blend-area {
            background: white;
            border-radius: 36px;
            padding: 24px 26px 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .rule-header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .rule-name { font-size: 1.6rem; font-weight: 700; color: #0d2b3e; }
        .rule-phoneme {
            font-size: 1.4rem;
            background: #d7e9f7;
            padding: 0 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #0f5b85;
            letter-spacing: 1px;
        }
        .rule-desc {
            color: #3a5f7a;
            font-size: 0.95rem;
            margin: 4px 0 14px 0;
            padding-bottom: 12px;
            border-bottom: 2px dashed #dce6ef;
        }

        .blend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin: 8px 0 6px;
        }
        .blend-card {
            background: #f5faff;
            border-radius: 20px;
            padding: 14px 8px 12px;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid transparent;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .blend-card:hover { border-color: #8fc9f0; background: #f0f8ff; }
        .blend-card.active-card { border-color: #f4a261; background: #fef5ed; }

        .word-display {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0a2536;
            letter-spacing: 0.5px;
        }
        .phoneme-chips {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2px 0;
        }
        .phoneme-chip {
            background: #dbe7f1;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #1f4b66;
            cursor: pointer;
            transition: all 0.15s;
            border: 2px solid transparent;
            user-select: none;
        }
        .phoneme-chip:hover { background: #6ab0e6; color: white; transform: scale(1.08); }
        .phoneme-chip:active { transform: scale(0.92); }
        .phoneme-chip.playing { background: #f4a261; color: white; border-color: #e07c3a; transform: scale(1.1); }

        .action-row {
            display: flex;
            gap: 4px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        .speak-btn {
            background: #e4edf6;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: #1f4b66;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .speak-btn:hover { background: #6ab0e6; color: white; transform: scale(1.04); }
        .speak-btn:active { transform: scale(0.94); }
        .speak-btn.blend-btn { background: #d5e8d5; color: #2d6a2d; }
        .speak-btn.blend-btn:hover { background: #5cb85c; color: white; }

        /* 拼读演示 */
        .blend-demo {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 2px dashed #dce6ef;
        }
        .blend-demo-title {
            font-weight: 600;
            color: #1a3244;
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .blend-steps {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 5px;
            background: #f2f8fe;
            padding: 14px 20px;
            border-radius: 50px;
            min-height: 60px;
        }
        .step-phoneme {
            background: white;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f5b85;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 2px solid #cde0ef;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .step-phoneme:hover { background: #6ab0e6; color: white; transform: scale(1.06); }
        .step-phoneme:active { transform: scale(0.94); }
        .step-phoneme.active-step { background: #f4a261; color: white; border-color: #e07c3a; transform: scale(1.1); }
        .step-arrow { font-size: 1.6rem; color: #6ab0e6; font-weight: 300; }
        .step-result {
            font-size: 2rem;
            font-weight: 700;
            color: #0d4b6e;
            background: #d7e9f7;
            padding: 0 24px;
            border-radius: 50px;
            margin-left: 2px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .step-result:hover { background: #b5d6ed; }
        .demo-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-left: auto;
        }
        .demo-speak-btn {
            background: #1f4b66;
            border: none;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(31, 75, 102, 0.25);
        }
        .demo-speak-btn:hover { background: #0d3852; transform: translateY(-2px); }
        .demo-speak-btn:active { transform: scale(0.96); }
        .demo-speak-btn.small { padding: 4px 14px; font-size: 0.8rem; }

        .speak-all {
            background: #2d4b62;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 2px;
            box-shadow: 0 4px 14px rgba(45, 75, 98, 0.2);
        }
        .speak-all:hover { background: #1b364a; transform: translateY(-2px); }
        .speak-all:active { transform: scale(0.96); }

        .footer {
            text-align: center;
            color: #7a95ab;
            font-size: 0.85rem;
            margin-top: 10px;
            opacity: 0.7;
        }
        .hint { font-size: 0.8rem; color: #8aacbf; margin-top: 4px; }

        @media (max-width: 550px) {
            .app { padding: 16px 12px; }
            h1 { font-size: 1.5rem; }
            .rule-name { font-size: 1.3rem; }
            .rule-phoneme { font-size: 1.1rem; padding: 0 12px; }
            .blend-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .word-display { font-size: 1.4rem; }
            .step-phoneme { font-size: 1.2rem; padding: 3px 12px; }
            .step-result { font-size: 1.5rem; padding: 0 14px; }
            .blend-steps { border-radius: 24px; padding: 10px 12px; }
            .phoneme-chip { font-size: 0.8rem; padding: 2px 8px; }
            .rule-btn { font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div class="app">
    <h1>🗣️ 音素拼读 <small>Phoneme Blending</small></h1>
    <div class="sub">🔊 点击音素听发音 → 再听合成后的完整单词</div>

    <div class="rule-strip" id="ruleStrip"></div>

    <div class="blend-area">
        <div class="rule-header">
            <span class="rule-name" id="ruleName">短元音 a</span>
            <span class="rule-phoneme" id="rulePhoneme">/æ/</span>
        </div>
        <div class="rule-desc" id="ruleDesc">点击单词下方的「拼读」听音素合成过程</div>

        <div class="blend-grid" id="wordGrid"></div>

        <div class="blend-demo" id="blendDemo">
            <div class="blend-demo-title">
                <span>🔁 拼读步骤 · 点击音素听发音</span>
                <span style="font-weight:400;font-size:0.8rem;color:#4f7a9c;">点击下方音素逐个听 → 再听完整单词</span>
            </div>
            <div class="blend-steps" id="blendSteps">
                <span style="color:#8aacbf;font-size:0.95rem;">👆 点击任意单词的「拼读」开始</span>
            </div>
            <div class="hint" id="blendHint">💡 点击每个音素可单独听发音，点击「听拼读」自动演示合成过程</div>
        </div>

        <button class="speak-all" id="speakAllBtn">
            <span>🔊</span> 朗读全部单词
        </button>
    </div>

    <div class="footer">💡 50+ 拼读规则 · 每个音素可点击发声 · 支持 Chrome / Edge / Safari</div>
</div>

    // ============================================================
    // 2. 状态
    // ============================================================
    let currentRuleId = rules[0].id;
    let currentDemoWord = null;
    let isPlaying = false;

    // ============================================================
    // 3. DOM
    // ============================================================
    const ruleStrip = document.getElementById('ruleStrip');
    const ruleName = document.getElementById('ruleName');
    const rulePhoneme = document.getElementById('rulePhoneme');
    const ruleDesc = document.getElementById('ruleDesc');
    const wordGrid = document.getElementById('wordGrid');
    const blendSteps = document.getElementById('blendSteps');
    const blendHint = document.getElementById('blendHint');
    const speakAllBtn = document.getElementById('speakAllBtn');

    // ============================================================
    // 4. 语音合成
    // ============================================================
    function speak(text, rate = 0.85, lang = 'en-US') {
        if (!window.speechSynthesis) {
            alert('您的浏览器不支持语音合成，请使用 Chrome/Edge/Safari。');
            return;
        }
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = rate;
        utterance.pitch = 1.0;
        utterance.volume = 1;

        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v =>
            v.lang.startsWith('en') &&
            (v.name.includes('Google UK') || v.name.includes('Samantha') || v.name.includes('Alex'))
        );
        if (preferred) utterance.voice = preferred;

        window.speechSynthesis.speak(utterance);
        return utterance;
    }

    function speakPhoneme(phoneme) {
        speak(phoneme, 0.9);
    }

    function speakWord(word) {
        speak(word, 0.8);
    }

    // 预加载语音
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ============================================================
    // 5. 拼读演示
    // ============================================================
    function showBlendDemo(wordObj) {
        currentDemoWord = wordObj;
        if (!wordObj) {
            blendSteps.innerHTML = `<span style="color:#8aacbf;font-size:0.95rem;">👆 点击任意单词的「拼读」开始</span>`;
            blendHint.textContent = '💡 点击每个音素可单独听发音，点击「听拼读」自动演示合成过程';
            return;
        }

        const phonemes = wordObj.phonemes;
        const fullWord = wordObj.word;

        let html = '';
        phonemes.forEach((p, idx) => {
            html += `<span class="step-phoneme" data-phoneme="${p}" data-index="${idx}" onclick="playSinglePhoneme(this, '${p}')">${p}</span>`;
            if (idx < phonemes.length - 1) {
                html += `<span class="step-arrow">→</span>`;
            }
        });
        html += `<span class="step-arrow">→</span>`;
        html += `<span class="step-result" onclick="speakWord('${fullWord}')" title="点击听完整单词">${fullWord}</span>`;

        html += `
            <div class="demo-controls">
                <button class="demo-speak-btn" onclick="playBlendDemo('${fullWord}')">
                    <span>🔊</span> 听拼读
                </button>
            </div>
        `;

        blendSteps.innerHTML = html;
        blendHint.textContent = '💡 点击每个音素听发音 → 点击完整单词听合成结果';
    }

    function playSinglePhoneme(el, phoneme) {
        document.querySelectorAll('.step-phoneme').forEach(e => e.classList.remove('active-step'));
        el.classList.add('active-step');
        setTimeout(() => el.classList.remove('active-step'), 600);
        speakPhoneme(phoneme);
    }

    function playBlendDemo(word) {
        if (isPlaying) return;
        const rule = rules.find(r => r.id === currentRuleId);
        if (!rule) return;
        const wordObj = rule.words.find(w => w.word === word);
        if (!wordObj) return;

        isPlaying = true;
        const phonemes = wordObj.phonemes;
        const steps = document.querySelectorAll('.step-phoneme');

        steps.forEach(el => el.classList.remove('active-step'));

        phonemes.forEach((p, idx) => {
            setTimeout(() => {
                steps.forEach(el => el.classList.remove('active-step'));
                if (steps[idx]) {
                    steps[idx].classList.add('active-step');
                }
                speakPhoneme(p);
            }, idx * 500);
        });

        setTimeout(() => {
            steps.forEach(el => el.classList.remove('active-step'));
            speakWord(word);
            isPlaying = false;
        }, phonemes.length * 500 + 350);
    }

    // ============================================================
    // 6. 渲染
    // ============================================================
    function renderRules() {
        ruleStrip.innerHTML = '';
        rules.forEach(rule => {
            const btn = document.createElement('button');
            btn.className = `rule-btn ${rule.id === currentRuleId ? 'active' : ''}`;
            btn.textContent = rule.name;
            btn.dataset.id = rule.id;
            btn.addEventListener('click', () => {
                currentRuleId = rule.id;
                renderRules();
                renderCurrentRule();
            });
            ruleStrip.appendChild(btn);
        });
    }

    function renderCurrentRule() {
        const rule = rules.find(r => r.id === currentRuleId);
        if (!rule) return;

        ruleName.textContent = rule.name;
        rulePhoneme.textContent = rule.phoneme;
        ruleDesc.textContent = rule.desc;

        wordGrid.innerHTML = '';
        rule.words.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'blend-card';
            if (currentDemoWord && currentDemoWord.word === item.word) {
                card.classList.add('active-card');
            }

            const wordSpan = document.createElement('div');
            wordSpan.className = 'word-display';
            wordSpan.textContent = item.word;

            const chips = document.createElement('div');
            chips.className = 'phoneme-chips';
            item.phonemes.forEach(p => {
                const chip = document.createElement('span');
                chip.className = 'phoneme-chip';
                chip.textContent = p;
                chip.title = '点击听音素发音';
                chip.addEventListener('click', (e) => {
                    e.stopPropagation();
                    speakPhoneme(p);
                    chip.classList.add('playing');
                    setTimeout(() => chip.classList.remove('playing'), 500);
                });
                chips.appendChild(chip);
            });

            const row = document.createElement('div');
            row.className = 'action-row';

            const blendBtn = document.createElement('button');
            blendBtn.className = 'speak-btn blend-btn';
            blendBtn.innerHTML = `🧩 拼读`;
            blendBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showBlendDemo(item);
                document.querySelectorAll('.blend-card').forEach(c => c.classList.remove('active-card'));
                card.classList.add('active-card');
                setTimeout(() => playBlendDemo(item.word), 300);
            });

            const speakBtn = document.createElement('button');
            speakBtn.className = 'speak-btn';
            speakBtn.innerHTML = `🔊 发音`;
            speakBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                speakWord(item.word);
            });

            row.appendChild(blendBtn);
            row.appendChild(speakBtn);

            card.appendChild(wordSpan);
            card.appendChild(chips);
            card.appendChild(row);

            card.addEventListener('click', () => {
                showBlendDemo(item);
                document.querySelectorAll('.blend-card').forEach(c => c.classList.remove('active-card'));
                card.classList.add('active-card');
                setTimeout(() => playBlendDemo(item.word), 300);
            });

            wordGrid.appendChild(card);
        });

        if (!currentDemoWord) {
            showBlendDemo(null);
        } else {
            const ruleData = rules.find(r => r.id === currentRuleId);
            if (ruleData) {
                const stillExists = ruleData.words.some(w => w.word === currentDemoWord.word);
                if (stillExists) {
                    showBlendDemo(currentDemoWord);
                } else {
                    showBlendDemo(null);
                }
            }
        }
    }

    // ============================================================
    // 7. 全部朗读
    // ============================================================
    function speakAllWords() {
        const rule = rules.find(r => r.id === currentRuleId);
        if (!rule) return;
        rule.words.forEach((item, idx) => {
            setTimeout(() => {
                speakWord(item.word);
            }, idx * 600);
        });
    }

    speakAllBtn.addEventListener('click', speakAllWords);

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            speakAllWords();
        }
    });

    // ============================================================
    // 8. 初始化
    // ============================================================
    renderRules();
    renderCurrentRule();
    console.log('🗣️ 音素拼读练习已启动！共 ' + rules.length + ' 条规则');
</script>
</body>
</html>
