<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔤 完整自然拼读 · 音素拼读练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
            background: #f0f5fb;
            min-height: 100vh;
            padding: 20px 12px;
        }
        .app {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 24px 24px 32px;
            box-shadow: 0 20px 60px rgba(0,20,40,0.10);
        }
        h1 {
            font-size: 2rem;
            color: #1a3244;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 small { font-size: 0.9rem; font-weight: 400; color: #4f7a9c; }
        .sub {
            color: #3a5f7a;
            border-left: 4px solid #6ab0e6;
            padding-left: 14px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        /* 分类筛选 */
        .category-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .cat-btn {
            background: white;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a3244;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            white-space: nowrap;
        }
        .cat-btn:hover { background: #e8f0f8; }
        .cat-btn.active {
            border-color: #6ab0e6;
            background: #dcebf7;
            color: #0d4b6e;
        }

        /* 规则选择 */
        .rule-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 5px 7px;
            margin-bottom: 16px;
            max-height: 130px;
            overflow-y: auto;
            padding: 4px 2px;
        }
        .rule-strip::-webkit-scrollbar { width: 4px; }
        .rule-strip::-webkit-scrollbar-thumb { background: #6ab0e6; border-radius: 4px; }

        .rule-btn {
            background: #f5f8fc;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a3244;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            white-space: nowrap;
        }
        .rule-btn:hover { background: #e0ecf7; }
        .rule-btn.active {
            border-color: #f4a261;
            background: #fef0e0;
            color: #a85a1a;
        }

        /* 主内容 */
        .blend-area {
            background: white;
            border-radius: 28px;
            padding: 20px 22px 26px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        }
        .rule-header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .rule-name { font-size: 1.5rem; font-weight: 700; color: #0d2b3e; }
        .rule-phoneme {
            font-size: 1.3rem;
            background: #d7e9f7;
            padding: 0 16px;
            border-radius: 40px;
            font-weight: 600;
            color: #0f5b85;
        }
        .rule-desc {
            color: #3a5f7a;
            font-size: 0.9rem;
            margin: 2px 0 12px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #dce6ef;
        }

        .blend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 6px 0;
        }
        .blend-card {
            background: #f5faff;
            border-radius: 18px;
            padding: 12px 6px 10px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.2s;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .blend-card:hover { border-color: #8fc9f0; background: #f0f8ff; }
        .blend-card.active-card { border-color: #f4a261; background: #fef5ed; }

        .word-display { font-size: 1.7rem; font-weight: 700; color: #0a2536; }
        .phoneme-chips { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
        .phoneme-chip {
            background: #dbe7f1;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #1f4b66;
            cursor: pointer;
            transition: all 0.15s;
            border: 2px solid transparent;
            user-select: none;
        }
        .phoneme-chip:hover { background: #6ab0e6; color: white; transform: scale(1.08); }
        .phoneme-chip:active { transform: scale(0.92); }
        .phoneme-chip.playing { background: #f4a261; color: white; border-color: #e07c3a; }

        .action-row { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; margin-top: 2px; }
        .speak-btn {
            background: #e4edf6;
            border: none;
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: #1f4b66;
        }
        .speak-btn:hover { background: #6ab0e6; color: white; }
        .speak-btn.blend-btn { background: #d5e8d5; color: #2d6a2d; }
        .speak-btn.blend-btn:hover { background: #5cb85c; color: white; }

        /* 拼读演示 */
        .blend-demo {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 2px dashed #dce6ef;
        }
        .blend-demo-title {
            font-weight: 600;
            color: #1a3244;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .blend-steps {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 4px;
            background: #f2f8fe;
            padding: 12px 18px;
            border-radius: 40px;
            min-height: 50px;
        }
        .step-phoneme {
            background: white;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f5b85;
            border: 2px solid #cde0ef;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .step-phoneme:hover { background: #6ab0e6; color: white; }
        .step-phoneme.active-step { background: #f4a261; color: white; border-color: #e07c3a; transform: scale(1.08); }
        .step-arrow { font-size: 1.4rem; color: #6ab0e6; font-weight: 300; }
        .step-result {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0d4b6e;
            background: #d7e9f7;
            padding: 0 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .step-result:hover { background: #b5d6ed; }
        .demo-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-left: auto; }
        .demo-speak-btn {
            background: #1f4b66;
            border: none;
            border-radius: 40px;
            padding: 5px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .demo-speak-btn:hover { background: #0d3852; transform: translateY(-2px); }
        .demo-speak-btn:active { transform: scale(0.96); }

        .speak-all {
            background: #2d4b62;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .speak-all:hover { background: #1b364a; transform: translateY(-2px); }
        .speak-all:active { transform: scale(0.96); }

        .footer { text-align: center; color: #7a95ab; font-size: 0.8rem; margin-top: 10px; opacity: 0.7; }
        .hint { font-size: 0.78rem; color: #8aacbf; margin-top: 3px; }
        .rule-count { font-size: 0.7rem; color: #8aacbf; margin-left: 8px; }

        @media (max-width: 550px) {
            .app { padding: 14px 10px; }
            h1 { font-size: 1.4rem; }
            .rule-name { font-size: 1.2rem; }
            .rule-phoneme { font-size: 1rem; padding: 0 10px; }
            .blend-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
            .word-display { font-size: 1.3rem; }
            .step-phoneme { font-size: 1.1rem; padding: 2px 10px; }
            .step-result { font-size: 1.4rem; padding: 0 12px; }
            .blend-steps { padding: 10px 12px; }
            .phoneme-chip { font-size: 0.7rem; padding: 1px 7px; }
            .cat-btn, .rule-btn { font-size: 0.65rem; padding: 3px 8px; }
        }
    </style>
</head>

    const ruleDesc = document.getElementById('ruleDesc');
    const ruleCount = document.getElementById('ruleCount');
    const wordGrid = document.getElementById('wordGrid');
    const blendSteps = document.getElementById('blendSteps');
    const blendHint = document.getElementById('blendHint');
    const speakAllBtn = document.getElementById('speakAllBtn');

    // ============================================================
    // 4. 语音合成
    // ============================================================
    function speak(text, rate = 0.85, lang = 'en-US') {
        if (!window.speechSynthesis) {
            alert('您的浏览器不支持语音合成，请使用 Chrome/Edge/Safari。');
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = rate;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google UK') || v.name.includes('Samantha') || v.name.includes('Alex')));
        if (preferred) utterance.voice = preferred;
        window.speechSynthesis.speak(utterance);
    }

    function speakPhoneme(p) { speak(p, 0.9); }
    function speakWord(w) { speak(w, 0.8); }

    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ============================================================
    // 5. 拼读演示
    // ============================================================
    function showBlendDemo(wordObj) {
        currentDemoWord = wordObj;
        if (!wordObj) {
            blendSteps.innerHTML = `<span style="color:#8aacbf;font-size:0.9rem;">👆 点击任意单词的「拼读」开始</span>`;
            blendHint.textContent = '💡 点击每个音素可单独听发音，点击「听拼读」自动演示合成过程';
            return;
        }
        const phonemes = wordObj.phonemes;
        const fullWord = wordObj.word;
        let html = '';
        phonemes.forEach((p, idx) => {
            html += `<span class="step-phoneme" data-phoneme="${p}" data-index="${idx}" onclick="playSinglePhoneme(this, '${p}')">${p}</span>`;
            if (idx < phonemes.length - 1) html += `<span class="step-arrow">→</span>`;
        });
        html += `<span class="step-arrow">→</span>`;
        html += `<span class="step-result" onclick="speakWord('${fullWord}')" title="点击听完整单词">${fullWord}</span>`;
        html += `<div class="demo-controls"><button class="demo-speak-btn" onclick="playBlendDemo('${fullWord}')"><span>🔊</span> 听拼读</button></div>`;
        blendSteps.innerHTML = html;
        blendHint.textContent = '💡 点击每个音素听发音 → 点击完整单词听合成结果';
    }

    function playSinglePhoneme(el, phoneme) {
        document.querySelectorAll('.step-phoneme').forEach(e => e.classList.remove('active-step'));
        el.classList.add('active-step');
        setTimeout(() => el.classList.remove('active-step'), 600);
        speakPhoneme(phoneme);
    }

    function playBlendDemo(word) {
        if (isPlaying) return;
        const rule = getCurrentRule();
        if (!rule) return;
        const wordObj = rule.words.find(w => w.word === word);
        if (!wordObj) return;
        isPlaying = true;
        const phonemes = wordObj.phonemes;
        const steps = document.querySelectorAll('.step-phoneme');
        steps.forEach(el => el.classList.remove('active-step'));
        phonemes.forEach((p, idx) => {
            setTimeout(() => {
                steps.forEach(el => el.classList.remove('active-step'));
                if (steps[idx]) steps[idx].classList.add('active-step');
                speakPhoneme(p);
            }, idx * 480);
        });
        setTimeout(() => {
            steps.forEach(el => el.classList.remove('active-step'));
            speakWord(word);
            isPlaying = false;
        }, phonemes.length * 480 + 350);
    }

    // ============================================================
    // 6. 获取当前规则
    // ============================================================
    function getCurrentRule() {
        return allRules.find(r => r.id === currentRuleId);
    }

    function getFilteredRules() {
        if (currentCategory === '全部') return allRules;
        return allRules.filter(r => r.category === currentCategory);
    }

    // ============================================================
    // 7. 渲染
    // ============================================================
    function renderCategories() {
        const cats = ['全部', ...new Set(allRules.map(r => r.category))];
        categoryStrip.innerHTML = '';
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-btn ${cat === currentCategory ? 'active' : ''}`;
            btn.textContent = cat;
            btn.addEventListener('click', () => {
                currentCategory = cat;
                const filtered = getFilteredRules();
                if (filtered.length > 0) {
                    currentRuleId = filtered[0].id;
                }
                renderCategories();
                renderRules();
                renderCurrentRule();
            });
            categoryStrip.appendChild(btn);
        });
    }

    function renderRules() {
        const filtered = getFilteredRules();
        ruleStrip.innerHTML = '';
        filtered.forEach(rule => {
            const btn = document.createElement('button');
            btn.className = `rule-btn ${rule.id === currentRuleId ? 'active' : ''}`;
            btn.textContent = rule.name;
            btn.addEventListener('click', () => {
                currentRuleId = rule.id;
                renderRules();
                renderCurrentRule();
            });
            ruleStrip.appendChild(btn);
        });
        if (filtered.length === 0) {
            ruleStrip.innerHTML = '<span style="color:#8aacbf;font-size:0.85rem;">该分类下暂无规则</span>';
        }
    }

    function renderCurrentRule() {
        const rule = getCurrentRule();
        if (!rule) {
            wordGrid.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">请选择一条规则</div>';
            return;
        }

        ruleName.textContent = rule.name;
        rulePhoneme.textContent = rule.phoneme;
        ruleDesc.textContent = rule.desc;
        ruleCount.textContent = rule.words.length + ' 个单词';

        wordGrid.innerHTML = '';
        rule.words.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'blend-card';
            if (currentDemoWord && currentDemoWord.word === item.word) card.classList.add('active-card');

            const wordSpan = document.createElement('div');
            wordSpan.className = 'word-display';
            wordSpan.textContent = item.word;

            const chips = document.createElement('div');
            chips.className = 'phoneme-chips';
            item.phonemes.forEach(p => {
                const chip = document.createElement('span');
                chip.className = 'phoneme-chip';
                chip.textContent = p;
                chip.title = '点击听音素发音';
                chip.addEventListener('click', (e) => {
                    e.stopPropagation();
                    speakPhoneme(p);
                    chip.classList.add('playing');
                    setTimeout(() => chip.classList.remove('playing'), 500);
                });
                chips.appendChild(chip);
            });

            const row = document.createElement('div');
            row.className = 'action-row';

            const blendBtn = document.createElement('button');
            blendBtn.className = 'speak-btn blend-btn';
            blendBtn.textContent = '🧩 拼读';
            blendBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showBlendDemo(item);
                document.querySelectorAll('.blend-card').forEach(c => c.classList.remove('active-card'));
                card.classList.add('active-card');
                setTimeout(() => playBlendDemo(item.word), 300);
            });

            const speakBtn = document.createElement('button');
            speakBtn.className = 'speak-btn';
            speakBtn.textContent = '🔊 发音';
            speakBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                speakWord(item.word);
            });

            row.appendChild(blendBtn);
            row.appendChild(speakBtn);

            card.appendChild(wordSpan);
            card.appendChild(chips);
            card.appendChild(row);

            card.addEventListener('click', () => {
                showBlendDemo(item);
                document.querySelectorAll('.blend-card').forEach(c => c.classList.remove('active-card'));
                card.classList.add('active-card');
                setTimeout(() => playBlendDemo(item.word), 300);
            });

            wordGrid.appendChild(card);
        });

        if (!currentDemoWord) {
            showBlendDemo(null);
        } else {
            const exists = rule.words.some(w => w.word === currentDemoWord.word);
            showBlendDemo(exists ? currentDemoWord : null);
        }
    }

    // ============================================================
    // 8. 全部朗读
    // ============================================================
    function speakAllWords() {
        const rule = getCurrentRule();
        if (!rule) return;
        rule.words.forEach((item, idx) => {
            setTimeout(() => speakWord(item.word), idx * 550);
        });
    }
    speakAllBtn.addEventListener('click', speakAllWords);

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); speakAllWords(); }
    });

    // ============================================================
    // 9. 初始化
    // ============================================================
    renderCategories();
    renderRules();
    renderCurrentRule();
    console.log('🗣️ 完整自然拼读已启动！共 ' + allRules.length + ' 条规则');
</script>
</body>
</html>
